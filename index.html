<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #flash-container {
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        canvas {
            display: block;
            background-color: #000 !important;
        }
    </style>
    <meta charset="UTF-8">
    <title>FAST FOOD FUNKIN'</title>
    <script src="ruffle/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "hidden",
            splashScreen: true,
            logLevel: "info",
            contextMenu: "off",
            allowScriptAccess: true,
            allowFullscreen: true,
        };
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("flash-container");
            container.appendChild(player);
            player.ruffle().load("flashforwardjam.swf");
            player.window
        });
    </script>
</head>
    <body style="margin: 0; background-color: #000; overflow: hidden; width: 100%; height: 100%;">
        <div id="flash-container" style="width: 100%; height: 100%; background-color: #000;"></div>
    </body>
</html>
