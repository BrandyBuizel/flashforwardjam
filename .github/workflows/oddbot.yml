---
name: "oddbot"
on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  oddbot:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
    steps:
      - name: Discord
        uses: sarisia/actions-status-discord@v1.16.0
        if: always()
        with:
          webhook: ${{secrets.DISCORD_WEBHOOK}}
          nodetail: false
          username: ODDBOT
          color: 0xb02780
          image: https://github.com/BrandyBuizel/flashforwardjam/blob/main/steam%2FHero%20Banner.png
          avatar_url: https://oddcore.wiki.gg/images/8/82/Client_logo.png
